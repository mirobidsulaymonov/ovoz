<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dissertatsiya Himoyasi - Tezkor Qidiruv</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #1a73e8;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --danger-color: #ea4335;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #dadce0;
            margin-bottom: 30px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95em;
            margin: 0;
        }

        .search-container {
            position: sticky;
            top: 15px;
            z-index: 1000;
            background: var(--bg-color);
            padding: 10px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px 25px;
            font-size: 18px;
            border: 1px solid #dfe1e5;
            border-radius: 30px;
            outline: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        input[type="text"]:focus {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border-color: var(--accent-color);
        }

        .mic-btn {
            background-color: var(--accent-color);
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .mic-btn.recording {
            background-color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }

        .results-info {
            margin: 15px 0;
            font-size: 0.95em;
            color: var(--text-muted);
            padding-left: 10px;
        }

        .results-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .qa-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #dadce0;
            transition: border 0.2s ease;
        }

        .qa-card:hover {
            border-color: var(--accent-color);
        }

        .question {
            font-weight: 600;
            font-size: 17px;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
        }

        .question::before {
            content: "S:";
            color: #9aa0a6;
            flex-shrink: 0;
        }

        .answer {
            font-size: 16px;
            color: var(--text-main);
            padding-left: 25px;
            border-top: 1px solid #f1f3f4;
            padding-top: 10px;
        }

        .highlight {
            background-color: #fff2ac;
            font-weight: bold;
            padding: 0 2px;
            border-radius: 3px;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            display: none;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            input[type="text"] { font-size: 16px; }
            .mic-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Dissertatsiya: Savol-Javoblar</h2>
        <p class="subtitle">Axborot iste'moli madaniyatini rivojlantirish metodikasi</p>
    </div>

    <div class="search-container">
        <input
            type="text"
            id="searchInput"
            placeholder="Kalit so'zni yozing..."
            oninput="searchQA()"
            autofocus
        >
        <button
            id="micBtn"
            class="mic-btn"
            onclick="toggleSpeechRecognition()"
            title="Ovozli qidiruv"
            type="button"
        >
            <svg focusable="false" viewBox="0 0 24 24" width="28" height="28" fill="white">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path>
            </svg>
        </button>
    </div>

    <div class="results-info" id="countInfo">Baza tayyor. Qidiruvni boshlang.</div>
    <div class="results-container" id="results"></div>
    <div class="no-results" id="noResults">Kechirasiz, bunday kalit so'z topilmadi.</div>

    <script>
        const qaData = [
            { q: "Jadval 1-jadvalda keltirilgan qiyosiy tahlilingizning eng muhim xulosasi nima?", a: "Asosiy xulosa shundan iboratki, texnik savodxonlik axborot madaniyati uchun faqat poydevor bo‘lib xizmat qiladi, lekin uning o‘rnini bosa olmaydi." },
            { q: "2019-yil 31-dekabrdagi 1059-sonli qarorning ishingizga qanday aloqasi bor?", a: "Bu uzluksiz ma’naviy tarbiya konsepsiyasi bo‘lib, unda belgilangan vazifalar tadqiqot negizini tashkil qiladi." },
            { q: "Axborot iste’moli madaniyati shakllangan o‘quvchi qanday sifatlarga ega bo‘ladi?", a: "U axborotni manbasini tekshiradi, feykni ajratadi, raqamli etikaga amal qiladi va axborotdan ma’naviy-ma’rifiy maqsadlarda foydalanadi." },
            { q: "Axborotni ongli qabul qilish qanday amalga oshiriladi?", a: "Yoshlarning har qanday ma’lumotga tanqidiy ko‘z bilan qarashi va uning ishonchliligini tekshirishi orqali." },
            { q: "Faktcheking ko‘nikmasini o‘quvchilarda shakllantirishning pedagogik ahamiyati nimada?", a: "Bu o‘quvchiga axborotning ishonchliligini mustaqil tekshirish imkonini beradi va uni manipulyatsiyalar qurboniga aylanishdan asraydi." }

            // ESKI FAYLINGIZDAGI BARCHA QA DATA NI SHU YERGA TO‘LIQ QO‘YING
        ];

        const searchInput = document.getElementById("searchInput");
        const resultsContainer = document.getElementById("results");
        const noResultsMsg = document.getElementById("noResults");
        const countInfo = document.getElementById("countInfo");
        const micBtn = document.getElementById("micBtn");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function highlightText(text, query) {
            if (!query) return text;
            const safeQuery = escapeRegExp(query);
            const regex = new RegExp(`(${safeQuery})`, "gi");
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function displayData(data, query) {
            resultsContainer.innerHTML = "";

            if (query === "") {
                noResultsMsg.style.display = "none";
                countInfo.innerText = `Kalit so'zni kiriting (jami: ${qaData.length} savol)`;
                return;
            }

            if (data.length === 0) {
                noResultsMsg.style.display = "block";
                countInfo.innerText = "Hech narsa topilmadi.";
                return;
            }

            noResultsMsg.style.display = "none";
            countInfo.innerText = `${data.length} ta mos keladigan javob topildi.`;

            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "qa-card";
                div.innerHTML = `
                    <div class="question">${highlightText(item.q, query)}</div>
                    <div class="answer">${highlightText(item.a, query)}</div>
                `;
                resultsContainer.appendChild(div);
            });
        }

        function searchQA() {
            const query = searchInput.value.trim().toLowerCase();

            const filteredData = qaData.filter(item =>
                item.q.toLowerCase().includes(query) ||
                item.a.toLowerCase().includes(query)
            );

            displayData(filteredData, query);
        }

        async function requestMicPermission() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("MEDIA_DEVICES_UNSUPPORTED");
            }
            return await navigator.mediaDevices.getUserMedia({ audio: true });
        }

        function setIdleState(message = "Baza tayyor. Qidiruvni boshlang.") {
            isRecording = false;
            micBtn.classList.remove("recording");
            searchInput.placeholder = "Kalit so'zni yozing...";
            countInfo.innerText = message;
        }

        function setupSpeechRecognition() {
            if (!SpeechRecognition) {
                micBtn.style.display = "none";
                countInfo.innerText = "Brauzeringiz ovozli qidiruvni qo‘llab-quvvatlamaydi.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = "uz-UZ";
            recognition.interimResults = false;
            recognition.continuous = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add("recording");
                searchInput.placeholder = "Eshitmoqdaman...";
                countInfo.innerText = "Gapiring...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                searchQA();
                countInfo.innerText = "Ovoz matnga aylantirildi.";
            };

            recognition.onspeechend = () => {
                if (recognition) {
                    recognition.stop();
                }
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove("recording");
                searchInput.placeholder = "Kalit so'zni yozing...";
            };

            recognition.onerror = (event) => {
                isRecording = false;
                micBtn.classList.remove("recording");

                let msg = "Ovozli qidiruvda xatolik yuz berdi.";

                switch (event.error) {
                    case "not-allowed":
                        msg = "Mikrofonga ruxsat berilmagan.";
                        break;
                    case "audio-capture":
                        msg = "Mikrofon topilmadi yoki ishlamayapti.";
                        break;
                    case "no-speech":
                        msg = "Ovoz aniqlanmadi. Qayta urinib ko‘ring.";
                        break;
                    case "network":
                        msg = "Tarmoq xatosi sabab ovoz tanilmadi.";
                        break;
                    case "aborted":
                        msg = "Ovozli qidiruv to‘xtatildi.";
                        break;
                }

                searchInput.placeholder = "Kalit so'zni yozing...";
                countInfo.innerText = msg;
                console.error("Speech Recognition Error:", event.error);
            };
        }

        async function toggleSpeechRecognition() {
            if (!recognition) {
                alert("Bu brauzer ovozli qidiruvni qo‘llab-quvvatlamaydi.");
                return;
            }

            if (isRecording) {
                recognition.stop();
                setIdleState("Ovozli qidiruv to‘xtatildi.");
                return;
            }

            try {
                micBtn.disabled = true;

                const stream = await requestMicPermission();
                stream.getTracks().forEach(track => track.stop());

                recognition.start();
            } catch (error) {
                console.error("Microphone permission error:", error);

                if (error.message === "MEDIA_DEVICES_UNSUPPORTED") {
                    countInfo.innerText = "Brauzer mikrofon API ni qo‘llab-quvvatlamaydi.";
                } else {
                    countInfo.innerText = "Mikrofonga ruxsat kerak. Brauzerda Allow bosing.";
                }
            } finally {
                micBtn.disabled = false;
            }
        }

        setupSpeechRecognition();
        displayData([], "");
    </script>
</body>
</html>
