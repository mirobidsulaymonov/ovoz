{q: "Tadqiqot natijalari o‘qituvchi tayyorlash tizimida qanday qo‘llanilishi mumkin?", a: "Malaka oshirish kurslari va pedagogika oliygohlarida bo‘lajak o‘qituvchilarga Axborot madaniyatini shakllantirish metodikasi sifatida o‘qitilishi mumkin."},
{q: "Tadqiqot natijalari qayerda aprobatsiyadan o‘tkazildi?", a: "Tanlab olingan tajriba-sinov maktablarida (Samarqand, Sirdaryo va Qashqadaryo viloyatlaridagi maktablarda)."},
{q: "Tadqiqot natijalaringizning ishonchliligi nimalarga asoslangan?", a: "Natijalarning ishonchliligi metodik yechimlarning ilmiy-nazariy asoslangani, model va tavsiyalarning amaliyotga tizimli joriy etilgani hamda matematik-statistik usullar orqali tasdiqlangani bilan belgilanadi."},
{q: "Tadqiqot natijalarining amaliy ahamiyati nimada?", a: "Amaliy ahamiyat o‘quv jarayoni va sinfdan tashqari faoliyat uchun tayyor metodik model, didaktik materiallar majmuasi va multimedia resurslarining ishlab chiqilgani bilan izohlanadi."},
{q: "Tadqiqot obyekti metodik-didaktik jarayon bo‘lsa, uni qanday o‘lchadingiz?", a: "Bu jarayonning samaradorligi o‘quvchilarning axborotni saralash, tahlil qilish va baholash ko‘nikmalarining oshishi orqali o‘lchandi."},
{q: "Tadqiqot obyekti nima deb o‘ylaysiz? (Matndan kelib chiqib)", a: "Yoshlarda axborot iste’moli madaniyatini rivojlantirish jarayoni."},
{q: "Tadqiqot predmeti sizning ilmiy yangiligingiz uchun poydevor bo'la oladimi?", a: "Albatta, chunki biz ishlab chiqadigan yangi model va amaliy mexanizmlar aynan shu predmet doirasida yaratiladi."},
{q: "Tadqiqot usullari o‘rtasidagi mantiqiy bog‘liqlik qanday?", a: "Dastlab nazariy usullar bilan poydevor qurildi, diagnostika orqali muammo aniqlandi, eksperimentda yechim sinab ko‘rildi va statistik usul bilan yakuniy natija tasdiqlandi."},
{q: "Tadqiqotda H_0 va H_1 gipotezalari nima uchun shakllantirildi?", a: "H_0 (nol gipoteza) — guruhlar o‘rtasida farq yo‘q deb hisoblaydi. $H_1$ (muqobil gipoteza) — tajriba natijasida samaradorlik mavjudligini anglatadi. Hisob-kitoblar natijasida $H_1$ gipotezasi tasdiqlandi."},
{q: "Tadqiqotda ishtirok etgan 365 o‘quvchining yosh toifasi qanday?", a: "Ular maktab ta’limining yuqori sinf o‘quvchilari bo‘lib, axborotni ongli qabul qilish yoshidagi kontingentdir."},
{q: "Tadqiqotingiz natijalari asosida o‘qituvchilar malakasini oshirish bo‘yicha qanday aniq taklifingiz bor?", a: "Tavsiyamizning 4-bandiga binoan, o‘qituvchilar uchun maxsus Mediasavodxonlik va raqamli pedagogika kurslarini yo‘lga qo‘yish zarur. O‘qituvchining o‘zi bu borada malakali bo‘lmas ekan, o‘quvchida bu madaniyatni shakllantirish qiyin kechadi."},
{q: "Tadqiqotingiz natijalari faqat 2020 va 2021 yillarda joriy etilganmi?", a: "Matnda keltirilgan rasmiy ma'lumotnomalar 2020-2021 yillarga tegishli, biroq ularning natijalari va ishlab chiqilgan metodikalar hozirgi kunda ham ta'lim jarayonida qo'llanilib kelmoqda."},
{q: "Tadqiqotingiz natijasida yoshlarda qanday yakuniy ko‘nikma shakllanadi?", a: "Axborot ummonida mustaqil yo‘l topa olish, ma’lumotni saralash va undan ongli ravishda o‘z rivojlanishi uchun foydalanish ko‘nikmasi."},
{q: "Tadqiqotingiz qaysi yirik davlat dasturi yoki konsepsiyasiga bevosita bog‘liq? ", a: "O‘zbekiston Respublikasi Xalq ta’limi tizimini 2030-yilgacha rivojlantirish konsepsiyasiga (PF-5712) hamda Uzluksiz ma’naviy tarbiya konsepsiyasiga (1059-sonli qaror)."},
{q: "Tadqiqotingiz respublika fan va texnologiyalari rivojlanishining qaysi ustuvor yo‘nalishiga kiradi?", a: "I-yo‘nalish: “Axborotlashgan jamiyat va demokratik davlatni ijtimoiy, madaniy va ma’naviy-ma’rifiy rivojlantirish” yo‘nalishiga."},
{q: "Tadqiqotingizda fuqarolik pozitsiyasi axborot iste'moli bilan qanday bog'langan?", a: "O'quvchining axborot muhitidagi faoliyati jamiyat manfaatlariga xizmat qilishi va ijtimoiy mas'uliyatni his qilishi orqali bog'langan."},
{q: "Tadqiqotingizda intervyu usuli nima uchun kerak bo‘ldi?", a: "Yoshlarning axborot iste’moli drayverlarini, ularning ijtimoiy tarmoqlardagi real qiziqishlari va motivatsiyasini chuqurroq aniqlash uchun foydalanildi."},
{q: "Tadqiqotingizda ijtimoiy barqarorlik masalasi qanday yoritilgan?", a: "Yoshlarning axborotni to‘g‘ri tahlil qilishi va manipulyatsiyaga uchramasligi jamiyatda turli nizolarning oldini olishi va barqarorlikni ta’minlashi tahlil qilingan."},
{q: "Tadqiqotingizda qanday asosiy usullar guruhidan foydalandingiz?", a: "Tadqiqotda to‘rt guruh usullardan foydalanildi: nazariy, diagnostik, tajribaviy va matematik-statistik usullar."},
{q: "Tadqiqotingizda ushbu to‘rtta olimning fikrlari o‘zaro qarama-qarshimi yoki bir-birini to‘ldiradimi?", a: "Ular bir-birini to‘ldiradi. Biz ularni tizimlashtirib, o‘quvchi yoshlar uchun eng maqbul bo‘lgan Gibrid metodologiyani yaratdik."},
{q: "Tadqiqotingizning asosiy xulosasi nima? Siz yoshlarda axborot iste’moli madaniyatini shunchaki bilim deb hisoblaysizmi?", a: "Yo‘q, tadqiqotimizning 2-bandida ta’kidlanganidek, axborot iste’moli madaniyati shunchaki bilim manbai emas, balki shaxs kamolotini ta’minlovchi ijtimoiy va axloqiy jarayondir. Uning asosiy maqsadi yoshlarda ma’naviy immunitet va axloqiy javobgarlikni shakllantirishdir."},
{q: "Tadqiqotingizning eng asosiy amaliy mahsuli nima?", a: "Yoshlarda axborot iste’moli madaniyatini rivojlantiruvchi metodik-didaktik modelning funksional strukturasi."},
{q: "Tadqiqotingizning ilmiy ahamiyati nimalarda namoyon bo‘ladi?", a: "Ilmiy ahamiyat ta’lim jarayoni mohiyatini qayta konseptuallashtirish, axborotni ongli qabul qilish mexanizmlarini modellashtirish va o‘quvchi sub’yektligini faollashtiruvchi strategik yondashuvlarni ishlab chiqishda namoyon bo‘ladi."},
{q: "Tadqiqotingizning ilmiy gipotezasiga ko‘ra, ta’lim jarayonida axborot faoliyati qanday tashkil etilmasligi kerak?", a: "Axborot faoliyati faqat ma’lumot yetkazish vositasi sifatida tashkil etilmasligi kerak."},
{q: "Tadqiqotingizning natijasi kimlar uchun foydali?", a: "Tadqiqot natijalari maktab va OTM pedagoglari, ota-onalar hamda axborot siyosati bilan shug‘ullanuvchi mutaxassislar uchun metodik asos bo‘lib xizmat qiladi."},
{q: "Tadqiqotingizning predmeti nima?", a: "Yoshlarda axborot iste’moli madaniyatini rivojlantirish jarayonida shakllanadigan metodik-didaktik ta’minotning mazmuni, modellari, texnologiyalari va amaliy mexanizmlari."},
{q: "Tadqiqotning qaysi amaliy yutug‘i o‘qituvchilar ishini osonlashtiradi?", a: "Tayyor integrativ ssenariylar va didaktik topshiriqlar majmuasi o'qituvchilarning darsga tayyorgarlik vaqtini qisqartiradi va dars sifatini oshiradi."},
{q: "Tahliliy usulda o‘zlashtirish deganda aynan qaysi metod nazarda tutilgan?", a: "Axborotni qismlarga ajratish, dalillarni tekshirish va mantiqiy xatolarni topishga qaratilgan amaliy tahlil usullari."},
{q: "Tajriba boshida (kirish nazorati) guruhlarning holati qanday edi?", a: "Tajriba boshida nazorat guruhi tajriba guruhidan yuqoriroq natijaga ega edi. Masalan, 5 baho ko‘rsatkichi nazorat guruhida 25,0%, tajriba guruhida esa 19,9% ni tashkil etgan."},
{q: "Tajriba boshidagi holat haqida nima deya olasiz?", a: "Tajriba boshida ko'rsatkichlar mos ravishda $2.50$ va $2.80$ bo'lib, samaradorlikka erishilmagan edi. Bu esa tajriba yakunidagi ijobiy o'zgarishlar aynan biz qo'llagan metodik modelning natijasi ekanligini anglatadi."},
{q: "Tajriba guruhida (181 nafar) o‘sish ko‘rsatkichlari nazorat guruhidan (184 nafar) sezilarli farq qilganini raqamlarsiz qanday izohlaysiz?", a: "Tajriba guruhidagi o‘quvchilar axborotni emotsional (shoshqaloqlik bilan) emas, balki mantiqiy-daliliy tahlil (faktcheking) asosida saralashni odatga aylantirdilar. Nazorat guruhida esa bunday tizimli o‘zgarish kuzatilmadi."},
{q: "Tajriba guruhida o‘sish dinamikasi qanday bo‘ldi?", a: "(Matndan kelib chiqib): Tajriba guruhida axborotni saralash va baholash ko‘nikmalari nazorat guruhiga nisbatan statistik jihatdan sezilarli darajada (masalan, $15-20\%$) yuqori bo‘ldi."},
{q: "Tajriba guruhida sifat ko‘rsatkichi (5 va 4 baholar yig‘indisi) qanchaga o‘sdi?", a: "Sifat ko‘rsatkichi tajriba boshidagi 50,8%dan tajriba yakunida 70,0%ga ko‘tarildi. Umumiy o‘sish 19,2%ni tashkil etdi."},
{q: "Tajriba ishlari qanday bosqichlardan boshlangan?", a: "Tajribaning maqsadi, vazifalari, tahlil mezonlari, o‘lchov indikatorlari va baholash instrumentlarini belgilashdan boshlangan."},
{q: "Tajriba jarayonida qo‘llangan kvest va keyslarning an’anaviy darslardan farqi nimada?", a: "An’anaviy darslarda axborot tayyor holda beriladi. Bizning metodikamizdagi kvest va keyslarda esa o‘quvchi axborotni o‘zi qidiradi, uning feyk ekanini tekshiradi va bu jarayonda uning axborot iste’moli madaniyati (kognitiv va amaliy komponentlari) faol rivojlanadi."},
{q: "Tajriba o‘tkazilgan maktablar (12, 10, 94) bir-biridan nima bilan farq qiladi?", a: "Ular turli geografik hududlarda joylashgan bo‘lsa-da, barchasida bizning metodik-didaktik tizimimiz bir xil bosqichda sinovdan o‘tkazildi."},
{q: "Tajriba sinovi -Nima uchun aynan maktab o‘quvchilari tanlangan?", a: "Chunki axborot iste’moli madaniyati poydevori aynan maktab davridan boshlab shakllantirilishi lozim bo‘lgan eng muhim kompetensiyadir."},
{q: "Tajriba sinovi- Siz o‘tkazgan amaliyotning takomillashtirilgan jihati nimada?", a: "Biz an’anaviy dars jarayoniga yangi metodik-didaktik yechimlarni kiritish orqali axborotni to‘g‘ri iste’mol qilish jarayonini takomillashtirdik."},
{q: "Tajriba yakunida 5 baho olgan o‘quvchilar ko‘rsatkichi qanday o‘zgardi?", a: "Tajriba guruhida 5 baholar 19,9%dan 30,56%ga ko‘tarildi (10,66% sof o‘sish). Nazorat guruhida esa bu ko‘rsatkich 25,0%dan 20,56%ga pasaydi."},
{q: "Tajriba yakunida o‘rtacha o‘zlashtirish ko‘rsatkichi qanchaga oshdi?", a: "Statistik tahlillarga ko'ra, tajriba guruhidagi o‘rtacha o‘zlashtirish nazorat guruhidagiga nisbatan 12,8% ga oshganligi aniqlandi."},
{q: "Tajribangizda Styudentning $t$-mezoni natijasi qanday bo‘ldi va bu nima beradi?", a: "Tajribada Styudentning tanlanma mezoni $t = 3.23$ ga teng bo'ldi. Bu ko'rsatkich olingan natijalarning tasodifiy emasligini va taklif etilgan metodika statistik jihatdan ishonchli ekanini (odatda $p < 0.05$ yoki $p < 0.01$ darajasida) tasdiqlaydi."},
{q: "Tajribaning ishonchliligini ta’minlash uchun jami nechta o‘quvchi qamrab olindi?", a: "Jami 365 nafar o‘quvchi ishtirok etdi. Ulardan 181 nafari tajriba, 184 nafari esa nazorat guruhiga kiritilgan (yakuniy hisob-kitobda har ikki guruhdan 180 nafardan tanlanma olingan)."},
{q: "Tajribaning kognitiv komponentini aniqlashda nimalarga e’tibor qaratilgan?", a: "O‘quvchilarning axborotni ongli tanlashi, saralashi va faktcheking (ma’lumotni tekshirish) ko‘nikmalariga."},
{q: "Tajriba-sinov ishlari natijalari haqiqatan ham tizimli joriy etilganini nima isbotlaydi?", a: "Maktablardan olingan dalolatnomalar, o‘quvchilarning yakuniy nazorat ishlari natijalari va dars ssenariylarining amaliyotga tatbiq etilgani."},
{q: "Tajriba-sinov ishlari qancha vaqt davom etdi?", a: "Tajriba-sinov ishlari dissertatsiyaning metodologik talablariga muvofiq, natijalar tahlili aniq bo‘lgunga qadar bo‘lgan davrni o‘z ichiga oladi."},
{q: "Tajriba-sinov ishlari qaysi hududlarda va qancha ishtirokchi bilan o‘tkazilgan?", a: "Tajriba Samarqand, Sirdaryo va Qashqadaryo viloyatlaridagi 3 ta maktabda, jami 365 nafar o‘quvchi ishtirokida amalga oshirilgan."},
{q: "Tajriba-sinov ishlari qaysi komponentlarni aniqlashga qaratilgan diagnostika tizimi asosida tashkil etilgan?", a: "Kognitiv (tanlash, faktcheking), affektiv (munosabat, ehtiyotkorlik) va axloqiy (etik munosabat, ishonchlilikni baholash) komponentlarni aniqlashga qaratilgan."},
{q: "Tajriba-sinov ishlarida matematik-statistik tahlilning o‘rni nimadan iborat?", a: "Olingan natijalarning tasodifiy emasligini isbotlash hamda tajribagacha va tajribadan so‘nggi holat o‘rtasidagi farqning ilmiy ishonchliligini tasdiqlash uchun."},
{q: "Tajriba-sinov ishlarida qanday takomillashtirish amaliyoti qo‘llanildi?", a: "Axborot iste’moli madaniyatini shakllantirishga qaratilgan yangi metodik tavsiyalar va didaktik materiallarni dars jarayoniga tatbiq etish amaliyoti."},
{q: "Tanqidiy-ta’limiy yo‘nalish (2-band) o‘quvchi sub’yektligini qanday oshiradi?", a: "O‘quvchi axborotga nisbatan Nima uchun?, Kim tomonidan?, Qanday maqsadda? degan savollarni berish orqali passiv ob’yektdan faol sub’yektga aylanadi."},
{q: "Tavsiyalaringizda maktab, oila va jamoat tashkilotlari hamkorligi haqida yozgansiz. Buni amalda qanday tasavvur qilasiz?", a: "Bu hamkorlik platformasi orqali ota-onalar va o‘quvchilar uchun umumiy profilaktik treninglar va raqamli xavfsizlik bo‘yicha ma’rifiy loyihalarni amalga oshirish nazarda tutilgan. Zero, axborot madaniyati faqat maktab bilan cheklanib qolmasligi kerak."},
{q: "TDPU loyihasida sizning nazariy-metodologik asoslaringizdan foydalanish natijasida nima ishlab chiqildi?", a: "Yoshlarda axborotni ongli qabul qilish, saralash va baholashni rivojlantiruvchi metodik-didaktik modelning funksional strukturasi ishlab chiqildi."},
{q: "TDPU loyihasining ikkinchi qismida aynan qaysi takliflaringiz joriy etildi?", a: "Global axborot oqimlari va axborot xavfsizligi tahdidlarini pedagogik tahlil qilish hamda ularning ta’limiy ahamiyatini belgilash bo‘yicha takliflarimizdan foydalanildi."},
{q: "Telekanal ssenariysida sizning qaysi metodik tavsiyalaringiz o‘z aksini topdi?", a: "Axborotni tanlab qabul qilish, tahlil qilish usullari va o‘quvchi faolligini kuchaytiruvchi mediata’lim elementlaridan foydalanilgan."},
{q: "Telekanalga joriy etish natijasida baholash tizimida qanday yangilik qilindi?", a: "Axborot bilan ishlashni baholovchi indikatorlar, diagnostika uslublari va refleksiya varaqalari majmuasi ishlab chiqildi."},
{q: "Telekanali  Nima uchun sizning ishingizdan aynan O'zbekiston tarixi telekanali foydalandi?", a: "Chunki tarixiy ma'lumotlarni tahlil qilishda ham faktcheking va manba ishonchliligini baholash ko'nikmasi juda muhim, bizning metodikamiz esa aynan shu muammoga yechim beradi."},

{q: "To‘rtinchi yangiligingizda integrativ tarzda moslashtirish deganda nima nazarda tutilgan?", a: "Bu mediasavodxonlik darslarini alohida fan sifatida emas, balki mavjud fanlar (tarix, ona tili, tarbiya) mazmuniga singdirilgan holda o‘qitish metodikasidir."},
{q: "To‘xtaxo‘jayeva ishlari sizning ishingiz bilan qayerda tutashadi?", a: "U axborot iste’moli psixologiyasini o‘rgangan. Biz esa bu psixologik asosni dars jarayoniga tatbiq etuvchi metodik modellarni yaratdik."},

{q: "uchinchi bobining asosiy maqsadi nima?", a: "Uchinchi bob “Yoshlarda axborot iste’moli madaniyatini oshirish bo‘yicha tajriba-sinov ishlari” deb nomlanadi. Asosiy maqsad — ishlab chiqilgan metodik-didaktik yechimlarning samaradorligini aniqlash va natijalarni matematik-statistik tahlil qilishdir."},
{q: "Uchinchi yangiligingizdagi neyropedagogik yondashuvning mohiyati nimada?", a: "Bu axborotni qabul qilishda inson miyasining neyrofiziologik xususiyatlarini, ya’ni diqqatni jamlash, xotira va axborot yuklamasining miyaga ta’sirini hisobga olgan holda o‘qitishdir."},
{q: "UNESCO va OECD kabi tashkilotlar bu borada nimalarni o‘rganmoqda?", a: "Ular yoshlarning feykka moyilligi, manipulyativ kontent ta’siri va raqamli muhitdagi axloqiy faolligini tadqiq qilmoqdalar."},
{q: "Ushbu bobda asosan nimalar tahlil qilingan va qanday mexanizmlar taklif etilgan?", a: "Bobda axborot iste’moli madaniyatini rivojlantirishning didaktik imkoniyatlari va tarbiyaviy yo‘nalishlari tahlil qilingan. Shuningdek, oshirish metodikasi takomillashtirilib, uni amaliyotga joriy etish mexanizmlari taklif qilingan."},
{q: "Ushbu huquqiy asoslar tadqiqotingizning ishonchlilik darajasini qanday belgilaydi?", a: "Tadqiqotimizning davlat tomonidan qabul qilingan strategik hujjatlar va farmonlarga asoslangani uning ijtimoiy buyurtma ekanligini va amaliy ahamiyati yuqoriligini isbotlaydi."},
{q: "Ushbu jadval sizning ikkinchi bobingizdagi metodik-didaktik model uchun qanday xizmat qildi?", a: "Biz modelimizning Maqsad blokiga ushbu jadvaldagi pedagogik natijalarni, Mazmun blokiga har ikki tomonning ijobiy g‘oyalarini kiritdik."},
{q: "Ushbu joriy etish natijasida dars jarayoni uchun qanday amaliy materiallar yaratildi?", a: "Mediasavodxonlik, faktcheking va axborot xavfsizligiga oid integrativ ssenariylar hamda didaktik topshiriqlar tuzildi."},
{q: "Ushbu tahdidlar sharoitida ta’lim tizimining asosiy vazifalari nimalardan iborat deb belgilandi?", a: "Tanqidiy fikrlashni, axborotni saralashni va axborot xavfsizligiga oid ongni shakllantirish zarurligi belgilandi."},
{q: "Ushbu uchta metod birlashganda o'quvchining axborotga munosabati qanday o'zgaradi?", a: "O'quvchi axborotni emotsional emas, balki mantiqiy-daliliy tahlil (filtratsiya) asosida saralaydi, uning tuzilishini baholaydi (mediatahlil) va uni shaxsiy vijdon bilan uyg'unlashtiradi (etika)."},
{q: "Vasko gumanitar OTM talabalari bo‘yicha qanday omillarni aniqlagan? ", a: "U axborot-psixologik xavfsizlikning kognitiv (aqliy) va emotsional (hissiy) omillarini alohida tadqiq qilgan."},
{q: "Vazifada-3 qanday Metodik-didaktik model haqida gap boradi?", a: "Axborotni ongli qabul qilishdan boshlab, uni tahlil qilish va baholashgacha bo‘lgan bosqichlarni o‘z ichiga olgan pedagogik model."},
{q: "Vazifadagi -2 global axborot oqimlari yoshlarga qanday ta’sir etadi?", a: "Ular yoshlar dunyoqarashini shakllantiradi yoki manipulyatsiya orqali chalg‘itadi. Biz bu ta’sirlarning pedagogik ahamiyatini o‘rgandik."},
{q: "Vazifadagi -4 amaliy faoliyat usullariga misol keltiring.", a: "Bular — darsda yoki darsdan tashqari vaqtda o‘quvchilar bilan o‘tkaziladigan interaktiv o‘yinlar, keys-stadi va faktcheking mashqlari."},
{q: "Vazifalaringiz izchilligi qanday belgilangan?", a: "Nazariy tahlildan (1-vazifa) boshlab, omillarni aniqlash (2-vazifa), model yaratish (3-vazifa) va amaliy tavsiyalar (4-vazifa) berishgacha bo‘lgan mantiqiy zanjir asosida."},
{q: "viloyat Nima uchun aynan 3 ta turli viloyat tanlangan?", a: "Tadqiqot natijalarining ishonchliligi va reprezentativligini ta’minlash, turli hududiy muhitdagi o‘quvchilarning axborot iste’moli madaniyatini qiyosiy o‘rganish uchun."},
{q: "Vizual tahlil usuli metodikangizda qanday o‘rin tutadi?", a: "Vizual tahlil orqali o‘quvchilar rasmlar, infografikalar va videolar orqali uzatiladigan yashirin ma’nolarni anglashni va ularni tanqidiy baholashni o‘rganadilar."},
{q: "Vizual-verbal faollashtiruvchi vositalar deganda nimalarni nazarda tutdingiz?", a: "Axborotni ham ko‘rish (infografika, video), ham eshitish/o‘qish (matnli tahlil) orqali kompleks qabul qilishga yordam beruvchi vositalar."},
{q: "Vizual-verbal faollashtiruvchi vositalarga nimalar kiradi?", a: "Axborotni tahlil qilishga yordam beruvchi infografikalar, interaktiv kartalar va tushuntiruvchi videoroliklar."},
{q: "Xalqaro tajribalarni shunchaki umumlashtirishmi?", a: "Yo‘q, biz xalqaro tajribadagi eng yaxshi elementlarni (masalan, faktcheking va raqamli etika) olib, ularni o‘zimizning pedagogik muhitimiz va qadriyatlarimiz asosida yangi metodik tizimga aylantirdik."},
{q: "Xobbs-AQSHlik olima R.Xobbsning mediasavodxonlikka yondashuvida asosiy urg‘u nimaga qaratilgan?", a: "R.Xobbs axborotni tanlab qabul qilish, manba ishonchliligini baholash va axborot immunitetini shakllantirish prinsiplarini asosiy o‘ringa qo‘ygan."},
{q: "Xobbsning axborot immuniteti tushunchasi sizning ishingizga qanchalik mos keladi?", a: "Bu tushuncha bizning tadqiqotimizning maqsadi bilan to‘la mos keladi, biz uni o‘z milliy ta’lim tizimimizga moslashtirilgan holda rivojlantirdik."},
{q: "Xorijda media literacy (media savodxonlik) atamasi ko‘proq ishlatiladi?", a: "Chunki G‘arbda axborot asosan media (TV, internet, ijtimoiy tarmoq) orqali tarqalishi va uning texnik xususiyatlariga ko‘proq urg‘u beriladi. Bizda esa madaniyat so‘zi orqali uning tarbiyaviy ildizlari qamrab olinadi."},
{q: "Xorijiy metodologiyada ijtimoiy-konstruktiv yondashuv ustuvor?", a: "Chunki bu yondashuvda bilim tayyor holda berilmaydi, balki o‘quvchi axborot muhitida boshqalar bilan muloqot va hamkorlik orqali o‘z tushunchalarini quradi (constructs). Biz buni o‘z modelimizda interaktiv metodlar orqali joriy etdik."},
{q: "Xorijiy olimlar ta’rifida milliy omillar yetarlicha qamrab olinmagan deb hisoblaysiz?", a: "G‘arb metodologiyasida (Kastels, Zurov) ko‘proq universal insoniy huquqlar va texnik erkinlikka urg‘u beriladi. Sharq pedagogikasida esa tarbiya va andisha filtrlari ustuvor. Biz aynan shu milliy filtrni tadqiqotimizga kiritdik."},
{q: "Xorijiy tadqiqotlardagi fuqarolik faolligi (civic engagement) bizning milliy sharoitimizda qanday transformatsiya qilinadi?", a: "Xorijda bu ko‘proq siyosiy-ijtimoiy huquqlardan foydalanishni anglatsa, bizning sharoitimizda u ijtimoiy mas’uliyat ko‘rinishida namoyon bo‘ladi. Ya’ni, axborotni tarqatishda jamiyat barqarorligi va milliy manfaatlarni his etish faolligi sifatida transformatsiya qilinadi."},
{q: "Xorijiy va mahalliy olimlar qarashlari qanday sintez qilingan? ", a: "Xorijiy olimlarning faktcheking texnologiyalari mahalliy olimlarimizning milliy-ma’naviy tarbiya borasidagi g‘oyalari bilan birlashtirildi."},
{q: "Yangi O‘zbekiston strategiyasi kitobidagi g‘oyalar bilan hamohangmi?", a: "Ha, kitobning 54-betida ta’kidlanganidek, yoshlarni axborot xurujlaridan himoya qilish bugungi kunning eng dolzarb vazifasi sifatida bizning ishimizda ilmiy asoslab berilgan."},
{q: "Yangiliklaringiz bir-birini qanday to‘ldiradi?", a: "1-yangilik nazariy asosni, 2-yangilik imkoniyat va mezonlarni, 3-yangilik modelni (tizimni), 4-yangilik esa amaliy metodikani taqdim etadi."},
{q: "Yangiliklaringizda dezinformatsiya masalasiga nega bunchalik katta urg‘u berilgan?", a: "Chunki hozirgi post-haqiqat (post-truth) davrida yoshlar uchun eng katta xavf — bu noto‘g‘ri ma’lumotlar orqali ongning manipulyatsiya qilinishidir."},
{q: "Yevropa Ittifoqi komissiyasining ilmiy hisoboti ishingizda qanday rol o‘ynadi?", a: "Biz ushbu hisobotda ishlab chiqilgan yoshlarda kritik fikrlashni shakllantirish indikatorlari tizimidan o‘z tadqiqotimizda o‘lchov mezoni sifatida foydalandik."},
{q: "Yevropa Ittifoqining mediasavodxonlik bo‘yicha ko‘rsatkichlari haqida nima deya olasiz?", a: "Yevropa Ittifoqida mediasavodxonlik darajasini o‘lchash uchun 30 dan ortiq maxsus milliy indikatorlar ishlab chiqilgan."},
{q: "Yoshlarda axborot iste’moli madaniyatini rivojlantirish jarayonini tashkil etishning qanday asoslari yoritilgan?", a: "Uni metodik-didaktik jihatdan tashkil etishning ilmiy asoslari yoritilgan."},
{q: "Yoshlarda tanqidiy fikrlash va ma’naviy immunitetni rivojlantirish uchun qanday tarkibiy qismlarni uyg‘unlashtirish zarur ekanligi ilmiy asoslangan?", a: "Axborot bilan ishlashda kognitiv, affektiv va axloqiy tarkibiy qismlarni uyg‘unlashtirish zarur omil ekani ilmiy asoslangan."},

{q: "Zamonaviy pedagogik paradigmalar deganda qaysi birini nazarda tutdingiz?", a: "Asosan shaxsga yo‘naltirilgan (person-centered) va kompetensiyaviy (competency-based) paradigmalarni nazarda tutdik."},
{q: "Zamonaviy ta’lim sharoitida axborot iste’moli madaniyatini rivojlantirish masalasi nazariy yondashuvdan tashqari yana nimani aniq belgilashni talab qiladi?", a: "Uning didaktik va tarbiyaviy asoslarini aniq belgilashni talab qiladi."},
{q: "Nima uchun statistik tahlilda Styudentning t-kriteriysidan foydalanildi?", a: "Ikki mustaqil bosh to‘plam (tajriba va nazorat guruhlari) o‘rtasidagi o‘rtacha ballar farqi statistik jihatdan ahamiyatli ekanini isbotlash uchun. Bunda ballar taqsimoti normal deb hisoblandi."},
{q: "Nizomov axborot madaniyatini nima bilan bog‘liq holda o‘rgangan?", a: "U global fikrlashni rivojlantirish va yoshlarda axborotni tahlil qilish ko‘nikmalarini shakllantirish masalalarini yoritgan."},
{q: "O‘qitish samaradorligini baholash mezoni ($K_{ef}$) va bilish darajasi mezoni ($K_{bil}$) natijalari qanday?", a: "Hisob-kitoblarimizga ko'ra, o‘qitish samaradorligi mezoni birdan katta ($K_{ef} > 1$) va bilish darajasini baholash mezoni noldan katta ($K_{bil} > 0$) bo'ldi. Bu tajriba guruhidagi o'zlashtirish nazorat guruhidan ustun ekanligining matematik isbotidir."},
{q: "O‘quvchi axborot faolligini baholovchi mezonlar nimalardan iborat?", a: "Axborotni qanchalik tez saralay olishi, tahlilining chuqurligi va axborotdan foydalanishda axloqiy me’yorlarga rioya qilishi."},

            countInfo.innerText = data.length + " ta mos keladigan javob topildi.";

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'qa-card';
                div.innerHTML = `
                    <div class="question">${highlightText(item.q, query)}</div>
                    <div class="answer">${highlightText(item.a, query)}</div>
                `;
                resultsContainer.appendChild(div);
            });
        }

        function searchQA() {
            const query = searchInput.value.trim().toLowerCase();
            
            const filteredData = qaData.filter(item => 
                item.q.toLowerCase().includes(query) || 
                item.a.toLowerCase().includes(query)
            );

            displayData(filteredData, query);
        }

        // Boshlang'ich holat
        displayData([], '');
    </script>
